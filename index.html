<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinergia Coworking - Acceso al Sistema</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos específicos para esta pantalla de selección */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            
        }

        .main-container {
            min-height: 100vh; /* Ocupa todo el alto visible */
            width: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: 'Inter', sans-serif; /* Usando tu fuente predeterminada */
        }

        /* Contenedor central que se estira para llenar el espacio */
        .content-wrapper {

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Rejilla de botones: se expande en alto */
        .options-grid {
            display: grid;
            grid-template-cols: 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1000px; /* Ancho máximo para no verse gigante en desktop */
            height: 100%; /* Se estira al alto del content-wrapper */
            max-height: 600px; /* Alto máximo sugerido */
        }

        @media (min-width: 768px) {
            .options-grid {
                grid-template-cols: repeat(2, 1fr);
                height: 70vh; /* En desktop, ocupa el 70% del alto */
            }
        }

        /* Tarjetas de opción personalizadas */
        .option-card {
            background-color: white;
            border: 2px solid transparent;
            border-radius: 1.5rem; /* rounded-3xl */
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none; /* Quita subrayado de links */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            justify-content: center; /* Centra contenido verticalmente dentro */
        }

        .option-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Colores específicos para cada botón */
        .option-dashboard {
            border-color: #e0e7ff; /* slate-100 */
        }
        .option-dashboard:hover {
            border-color: #4f46e5; /* indigo-600 */
        }
        .option-dashboard .icon-box {
            background-color: #e0e7ff; /* indigo-100 */
            color: #4f46e5; /* indigo-600 */
        }
        .option-dashboard:hover .icon-box {
            background-color: #4f46e5;
            color: white;
        }

        .option-reserva {
            border-color: #d1fae5; /* emerald-100 */
        }
        .option-reserva:hover {
            border-color: #10b981; /* emerald-600 */
        }
        .option-reserva .icon-box {
            background-color: #d1fae5; /* emerald-100 */
            color: #10b981; /* emerald-600 */
        }
        .option-reserva:hover .icon-box {
            background-color: #10b981;
            color: white;
        }

        /* Contenedor del icono */
        .icon-box {
            width: 80px;
            height: 80px;
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        
        /* Ajuste de textos */
        .card-title {
            font-size: 2.25rem; /* text-4xl */
            font-weight: 800; /* font-extrabold */
            color: #1e293b; /* slate-800 */
            margin-bottom: 1rem;
        }
        
        .card-desc {
            font-size: 1.125rem; /* text-lg */
            color: #64748b; /* slate-500 */
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 320px;
        }
        
        .action-text {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="w-full pt-10 pb-4 flex flex-col items-center">
            <img src="img/logoCoworking.png" alt="Logo Sinergia" class="h-16 w-16 mb-4 object-contain">
            <span class="text-xl font-bold tracking-tighter">Coworking <span class="text-indigo-600">Sinergia</span></span>
            <h1 class="text-2xl font-bold text-slate-950 tracking-tighter">Hub de prueba de Experiencias de usuarios.</h1>
        </header>

        <div class="content-wrapper">
            
            <div class="options-grid">
                
                <a href="appIndexAdmin.html" class="option-card option-dashboard animate-fade-in-up">
                    <div class="icon-box">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                        </svg>
                    </div>
                    <h2 class="card-title">Perfil Administrador</h2>
                    <p class="card-desc">Vista rápida de métricas, estado actual del coworking y reservas activas.</p>
                    
                </a>

                <a href="indexUser.html" class="option-card option-reserva animate-fade-in-up" style="animation-delay: 150ms;">
                    <div class="icon-box">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.25 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM2.25 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM18.75 7.5a.75.75 0 0 0-1.5 0v2.25H15a.75.75 0 0 0 0 1.5h2.25v2.25a.75.75 0 0 0 1.5 0v-2.25H21a.75.75 0 0 0 0-1.5h-2.25V7.5Z"></path>
                        </svg>
                        
                    </div>
                    <h2 class="card-title">Usuario del B2C</h2>
                    <p class="card-desc">Crea y gestiona reservas manuales como usuario del Coworking.</p>

                </a>

            </div>

        </div>

    </div>

</body>
</html>
